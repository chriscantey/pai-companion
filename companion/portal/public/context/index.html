<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Context Browser</title>
  <link href="/shared/themes.css" rel="stylesheet">
  <script src="/shared/config.js"></script>
  <script src="/shared/theme-init.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: var(--leading-body);
      min-height: 100vh;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
      font-size: 0.85rem;
    }
    nav a { color: var(--text-muted); text-decoration: none; }
    nav a:hover { color: var(--cyan); }
    nav span { color: var(--text-muted); }
    header { margin-bottom: 2rem; }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 0.5rem;
    }
    header p { color: var(--text-muted); font-size: 0.95rem; }
    .count-badge {
      display: inline-block;
      background: rgba(18, 194, 233, 0.15);
      color: var(--cyan);
      padding: 0.15rem 0.6rem;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 0.5rem;
    }
    .search {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      outline: none;
    }
    .search:focus { border-color: var(--cyan); }
    .search::placeholder { color: var(--text-muted); }

    /* Section groups */
    .section { margin-bottom: 2rem; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .section-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 0.1rem 0.5rem;
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .card:hover {
      background: var(--bg-tertiary);
      border-color: rgba(18, 194, 233, 0.3);
      transform: translateY(-1px);
    }
    .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--cyan);
      margin-bottom: 0.3rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .card-path {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-bottom: 0.5rem;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    /* Tags */
    .tag {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .tag-always { background: rgba(45, 212, 191, 0.15); color: var(--teal); }
    .tag-on-demand { background: rgba(196, 113, 237, 0.15); color: var(--purple); }
    .tag-system { background: rgba(107, 182, 255, 0.15); color: var(--blue); }
    .tag-user { background: rgba(255, 107, 157, 0.15); color: var(--pink); }
    .tag-startup { background: rgba(18, 194, 233, 0.15); color: var(--cyan); }
    .tag-contextfiles { background: rgba(243, 156, 18, 0.15); color: var(--orange); }
    .tag-routing { background: rgba(196, 113, 237, 0.15); color: var(--purple); }
    .tag-size {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-weight: 400;
    }

    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    footer {
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    #loading { text-align: center; padding: 2rem; color: var(--text-muted); }

    /* Modal / slide-over */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      justify-content: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal-panel {
      width: min(720px, 90vw);
      height: 100vh;
      background: var(--bg-primary);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 2rem;
      animation: slideIn 0.2s ease-out;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-header-left { flex: 1; }
    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--cyan);
    }
    .modal-path {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-top: 0.3rem;
    }
    .modal-close {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .modal-close:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .modal-meta {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .modal-meta-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-right: 0.5rem;
    }

    /* Rendered markdown */
    .md-content { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.8; }
    .md-content h1 { font-size: 1.3rem; font-weight: 700; color: var(--cyan); margin: 1.5rem 0 0.75rem; }
    .md-content h2 { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); margin: 1.25rem 0 0.5rem; }
    .md-content h3 { font-size: 0.95rem; font-weight: 600; color: var(--text-secondary); margin: 1rem 0 0.5rem; }
    .md-content p { margin: 0.5rem 0; }
    .md-content a { color: var(--cyan); }
    .md-content code {
      background: var(--bg-secondary);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
      color: var(--pink);
    }
    .md-content pre {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      margin: 0.75rem 0;
    }
    .md-content pre code { background: none; padding: 0; color: var(--text-secondary); }
    .md-content table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.85rem; }
    .md-content th {
      background: var(--bg-secondary);
      text-align: left;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-weight: 600;
    }
    .md-content td { padding: 0.5rem 0.75rem; border: 1px solid var(--border); }
    .md-content ul, .md-content ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    .md-content li { margin: 0.25rem 0; }
    .md-content blockquote {
      border-left: 3px solid var(--purple);
      padding-left: 1rem;
      margin: 0.75rem 0;
      color: var(--text-muted);
    }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    .md-content strong { color: var(--text-primary); }

    /* Frontmatter block */
    .frontmatter {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: pre-wrap;
    }
    .frontmatter .fm-key { color: var(--purple); }
    .frontmatter .fm-val { color: var(--teal); }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/">Portal</a>
      <span>/</span>
      <span>Context</span>
    </nav>

    <header>
      <h1>Context Browser <span class="count-badge" id="count">...</span></h1>
      <p>PAI context files, how they load, and what they contain. Click any file to view its contents.</p>
    </header>

    <input type="text" class="search" id="search" placeholder="Filter context files..." autofocus>

    <div id="listing">
      <div id="loading">Loading context files...</div>
    </div>

    <footer>
      PAI Companion Portal
    </footer>
  </div>

  <!-- Slide-over detail panel -->
  <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-panel" id="modal-panel">
      <div class="modal-header">
        <div class="modal-header-left">
          <div class="modal-title" id="modal-title">File</div>
          <div class="modal-path" id="modal-path"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">Esc</button>
      </div>
      <div id="modal-meta"></div>
      <div class="md-content" id="modal-content">Loading...</div>
    </div>
  </div>

  <script>
    let contextData = null;

    async function loadContext() {
      try {
        const res = await fetch('/api/context');
        contextData = await res.json();
        document.getElementById('count').textContent = contextData.files.length;
        render();
      } catch (e) {
        document.getElementById('listing').innerHTML = '<div class="empty"><p>Could not load context files.</p></div>';
      }
    }

    function render() {
      const q = (document.getElementById('search').value || '').toLowerCase();
      const container = document.getElementById('listing');
      const files = contextData.files.filter(f =>
        f.name.toLowerCase().includes(q) || f.relativePath.toLowerCase().includes(q)
      );

      // Group by loading type
      const always = files.filter(f => f.loading === 'always');
      const userOnDemand = files.filter(f => f.loading === 'on-demand' && f.category === 'user');
      const systemOnDemand = files.filter(f => f.loading === 'on-demand' && f.category === 'system');

      let html = '';

      if (always.length > 0) {
        html += renderSection('Always Loaded', 'Every session, every agent', always);
      }
      if (userOnDemand.length > 0) {
        html += renderSection('User Context (On-Demand)', 'Loaded via CONTEXT_ROUTING when needed', userOnDemand);
      }
      if (systemOnDemand.length > 0) {
        html += renderSection('System Docs (On-Demand)', 'PAI system documentation', systemOnDemand);
      }

      if (html === '') {
        html = '<div class="empty"><p>No files match your search.</p></div>';
      }
      container.innerHTML = html;
    }

    function renderSection(title, subtitle, files) {
      let html = '<div class="section"><div class="section-header">';
      html += '<span class="section-title">' + title + '</span>';
      html += '<span class="section-count">' + files.length + '</span>';
      html += '</div>';
      if (subtitle) {
        html += '<p style="color:var(--text-muted);font-size:0.8rem;margin:-0.5rem 0 1rem;">' + subtitle + '</p>';
      }
      html += '<div class="grid">';
      for (const f of files) {
        html += renderCard(f);
      }
      html += '</div></div>';
      return html;
    }

    function renderCard(f) {
      let html = '<div class="card" onclick="openFile(\'' + escAttr(f.relativePath) + '\')">';
      html += '<div class="card-name">' + esc(f.name) + '</div>';
      html += '<div class="card-path">' + esc(f.relativePath) + '</div>';
      html += '<div class="card-meta">';
      // Loading tag
      if (f.loading === 'always') {
        html += '<span class="tag tag-always">always</span>';
      } else {
        html += '<span class="tag tag-on-demand">on-demand</span>';
      }
      // Category tag
      if (f.category === 'system') {
        html += '<span class="tag tag-system">system</span>';
      } else {
        html += '<span class="tag tag-user">user</span>';
      }
      // Loading mechanism tag
      if (f.loadingDetail.includes('native')) {
        html += '<span class="tag tag-startup">native</span>';
      } else if (f.loadingDetail.includes('loadAtStartup')) {
        html += '<span class="tag tag-startup">loadAtStartup</span>';
      } else if (f.loadingDetail.includes('contextFiles')) {
        html += '<span class="tag tag-contextfiles">contextFiles</span>';
      } else {
        html += '<span class="tag tag-routing">routing</span>';
      }
      // Size
      html += '<span class="tag tag-size">' + formatSize(f.size) + '</span>';
      html += '</div></div>';
      return html;
    }

    async function openFile(relPath) {
      const modal = document.getElementById('modal');
      const title = document.getElementById('modal-title');
      const pathEl = document.getElementById('modal-path');
      const metaEl = document.getElementById('modal-meta');
      const content = document.getElementById('modal-content');

      const file = contextData.files.find(f => f.relativePath === relPath);
      title.textContent = file ? file.name : relPath.split('/').pop();
      pathEl.textContent = '~/.claude/' + relPath;
      content.innerHTML = '<p style="color:var(--text-muted)">Loading file...</p>';

      // Show meta tags
      if (file) {
        let meta = '<div class="modal-meta">';
        meta += '<span class="modal-meta-label">Loading:</span>';
        if (file.loading === 'always') {
          meta += '<span class="tag tag-always">always</span>';
        } else {
          meta += '<span class="tag tag-on-demand">on-demand</span>';
        }
        if (file.category === 'system') {
          meta += '<span class="tag tag-system">system</span>';
        } else {
          meta += '<span class="tag tag-user">user</span>';
        }
        if (file.loadingDetail.includes('native')) {
          meta += '<span class="tag tag-startup">native</span>';
        } else if (file.loadingDetail.includes('loadAtStartup')) {
          meta += '<span class="tag tag-startup">loadAtStartup</span>';
        } else if (file.loadingDetail.includes('contextFiles')) {
          meta += '<span class="tag tag-contextfiles">contextFiles</span>';
        } else {
          meta += '<span class="tag tag-routing">routing</span>';
        }
        meta += '<span class="tag tag-size">' + formatSize(file.size) + '</span>';
        meta += '<span style="color:var(--text-muted);font-size:0.75rem;margin-left:0.5rem;">' + esc(file.loadingDetail) + '</span>';
        meta += '</div>';
        metaEl.innerHTML = meta;
      } else {
        metaEl.innerHTML = '';
      }

      modal.classList.add('open');
      document.body.style.overflow = 'hidden';

      try {
        const res = await fetch('/api/context/' + encodeURIComponent(relPath));
        const data = await res.json();

        // Markdown rendering
        let md = data.content;
        let frontmatter = '';
        const fmMatch = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n/);
        if (fmMatch) {
          frontmatter = fmMatch[1];
          md = md.slice(fmMatch[0].length);
        }

        let html = '';
        if (frontmatter) {
          const fmHtml = frontmatter
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/^(\w[\w\s]*?):/gm, '<span class="fm-key">$1</span>:')
            .replace(/:\s*(.+)$/gm, ': <span class="fm-val">$1</span>');
          html += '<div class="frontmatter">' + fmHtml + '</div>';
        }

        html += marked.parse(md);
        content.innerHTML = html;
      } catch (e) {
        content.innerHTML = '<p style="color:var(--orange)">Could not load file contents.</p>';
      }
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function escAttr(s) {
      return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    document.getElementById('search').addEventListener('input', render);

    loadContext();
  </script>
  <script src="/shared/common.js"></script>
</body>
</html>
